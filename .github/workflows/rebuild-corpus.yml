name: Rebuild corpus

# Re-ingest the RAG and push the vector store to the Hugging Face Space whenever
# the source list (or the ingester) changes, or on a manual run. This keeps the
# heavy ML deps and the HF token in CI, out of the publishing agent's environment.
on:
  push:
    paths:
      - "sources.json"
      - "ingest.py"
  workflow_dispatch:

# Shares its group with check-source-edits.yml so the two corpus workflows
# fully serialize. cancel-in-progress stays false on BOTH: neither an ingest
# nor an upload is a job you want killed halfway.
concurrency:
  group: corpus-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild Chroma from the live sources
        run: python ingest.py

      # Quirk to NOT "fix": this uploads through the Python API, not `hf upload`.
      # The CLI hardcodes create_repo(space_sdk="gradio") on every --repo-type=space
      # upload; HF's July 2026 free-tier gate 402s that call before exist_ok is ever
      # checked. upload_folder() never calls create_repo, so it commits straight to
      # the existing Space. Reverting this to the CLI re-breaks the workflow.
      - name: Push the vector store to the Space
        env:
          HF_TOKEN: ${{ secrets.CORPUS_CI }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).upload_folder(
              repo_id="RNVizion/ask-the-corpus",
              repo_type="space",
              folder_path="chroma",
              path_in_repo="chroma",
          )
          print("uploaded chroma/ to Space")
          PY
