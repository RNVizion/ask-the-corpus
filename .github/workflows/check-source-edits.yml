name: Rebuild corpus on source edits

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours; tighten or loosen as you like
  workflow_dispatch:          # manual "Run workflow" button

permissions:
  contents: write             # to commit the updated hash file back

# Shares its group with rebuild-corpus.yml so the two corpus workflows
# fully serialize. cancel-in-progress stays false on BOTH.
concurrency:
  group: corpus-rebuild
  cancel-in-progress: false

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout corpus repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover new posts from the feed
        run: python discover.py

      - name: Check tracked sources for edits
        id: check
        run: python check_edits.py

      - name: Re-ingest (only if a source changed)
        if: steps.check.outputs.changed == 'true'
        run: python ingest.py

      # Quirk to NOT "fix": Python API, not `hf upload` — see rebuild-corpus.yml
      # for the full note. The CLI 402s on free accounts; upload_folder doesn't.
      - name: Push fresh index to the Space
        if: steps.check.outputs.changed == 'true'
        env:
          HF_TOKEN: ${{ secrets.CORPUS_CI }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).upload_folder(
              repo_id="RNVizion/ask-the-corpus",
              repo_type="space",
              folder_path="chroma",
              path_in_repo="chroma",
          )
          print("uploaded chroma/ to Space")
          PY

      - name: Commit updated hashes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources.json .source-hashes.json
          git commit -m "corpus: refresh after source change (${{ steps.check.outputs.summary }})" || echo "nothing to commit"
          git push

