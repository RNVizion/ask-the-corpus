name: eval

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "ingest.py"
      - "sources.json"
      - "chroma/**"
      - "eval/**"
      - ".github/workflows/eval.yml"
  pull_request:
    paths:
      - "app.py"
      - "ingest.py"
      - "sources.json"
      - "chroma/**"
      - "eval/**"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run eval report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python eval/evaluate.py --report-only

      - name: Gate on thresholds
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest eval/test_eval.py -v

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: |
            eval/report.md
            eval/results.json
